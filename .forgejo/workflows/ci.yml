name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: forgejo.moseisley.es
  IMAGE: forgejo.moseisley.es/wind/readingview

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: Lint
        run: ruff check backend/

      - name: Format check
        run: ruff format --check backend/

      - name: Type check
        run: mypy backend/

      - name: Security scan
        run: bandit -r backend/app backend/book_recommender && pip-audit

      - name: Test
        run: pytest --cov --cov-fail-under=80
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable corepack
        run: corepack enable && corepack prepare --activate
        working-directory: frontend

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Lint
        run: pnpm lint
        working-directory: frontend

      - name: Type check
        run: pnpm type-check
        working-directory: frontend

      - name: Audit
        run: pnpm audit
        working-directory: frontend

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          SHA=$(git rev-parse --short HEAD)
          docker build -t ${{ env.IMAGE }}:latest -t ${{ env.IMAGE }}:sha-${SHA} .

      - name: Smoke test
        run: |
          docker rm -f smoke 2>/dev/null || true
          docker run -d --name smoke \
            -e SECRET_KEY=smoke-test-key \
            ${{ env.IMAGE }}:latest
          OK=0
          for i in $(seq 1 60); do
            if docker exec smoke curl -sf http://127.0.0.1:8000/api/health > /dev/null 2>&1; then
              OK=1
              break
            fi
            sleep 1
          done
          if [ "$OK" = "0" ]; then
            docker logs smoke
            exit 1
          fi
          echo "Health OK"
          docker rm -f smoke

      - name: Configure Docker push concurrency
        run: |
          sudo mkdir -p /etc/docker && echo '{"max-concurrent-uploads": 2}' | sudo tee /etc/docker/daemon.json
          sudo kill -HUP $(sudo cat /var/run/docker.pid)
          sleep 2
          echo "${{ secrets.FORGEJO_TOKEN }}" | docker login ${{ env.REGISTRY }} -u Wind --password-stdin

      - name: Push image
        run: docker push --all-tags ${{ env.IMAGE }}

      - name: Prune images
        if: success()
        run: docker image prune -f
