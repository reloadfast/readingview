name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: forgejo.moseisley.es
  IMAGE: forgejo.moseisley.es/wind/readingview

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: Lint
        run: ruff check backend/

      - name: Format check
        run: ruff format --check backend/

      - name: Type check
        run: mypy backend/

      - name: Security scan
        run: bandit -r backend/ && pip-audit

      - name: Test
        run: pytest --cov --cov-fail-under=80
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable corepack
        run: corepack enable && corepack prepare --activate
        working-directory: frontend

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Lint
        run: pnpm lint
        working-directory: frontend

      - name: Type check
        run: pnpm type-check
        working-directory: frontend

      - name: Audit
        run: pnpm audit
        working-directory: frontend

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.FORGEJO_USERNAME }}
          password: ${{ secrets.FORGEJO_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          load: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Smoke test
        run: |
          docker run -d --name smoke -p 8000:8000 ${{ env.IMAGE }}:latest
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/health; then
              echo "Health OK"
              break
            fi
            if [ "$i" = "30" ]; then
              docker logs smoke
              exit 1
            fi
            sleep 1
          done

      - name: Prune images
        if: success()
        run: docker image prune -f
