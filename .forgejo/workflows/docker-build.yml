name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

env:
  REGISTRY: forgejo.moseisley.es
  IMAGE: forgejo.moseisley.es/wind/readingview

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Forgejo registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.FORGEJO_USERNAME }}
          password: ${{ secrets.FORGEJO_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          IMAGE="${{ env.IMAGE }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "tags=${IMAGE}:pr-${{ github.event.number }}" >> "$GITHUB_OUTPUT"
          elif echo "${{ github.ref }}" | grep -q '^refs/tags/v'; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            MAJOR="${VERSION%%.*}"
            MINOR="${VERSION%.*}"
            echo "tags=${IMAGE}:${VERSION},${IMAGE}:${MINOR},${IMAGE}:${MAJOR},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMAGE}:${SHORT_SHA},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: readingview:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Run Trivy vulnerability scanner
        run: |
          trivy image \
            --format table \
            --exit-code 0 \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            readingview:scan

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
