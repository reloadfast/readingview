version: '3.8'

services:
  readingview:
    image: forgejo.moseisley.es/wind/readingview:latest
    container_name: readingview
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/readingview.db
      - SECRET_KEY=${SECRET_KEY}
      - TZ=${TZ:-UTC}
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
